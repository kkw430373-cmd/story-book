<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Story Readers | 한국 문화 영어 스토리북</title>
    <meta name="description" content="한국 문화를 영어로 배우는 단계별 스토리북 앱. Step into Reading 스타일의 5단계 영어 리딩 프로그램.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reader.css">
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-icon">
                <span class="loading-emoji">📚</span>
            </div>
            <h2 class="loading-title">K-Story Readers</h2>
            <p class="loading-subtitle">한국 문화 영어 스토리북을 불러오는 중...</p>
            <div class="loading-bar">
                <div class="loading-bar-fill"></div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <div class="logo-text">
                    <h1>K-Story Readers</h1>
                    <p class="logo-subtitle">한국 문화 영어 스토리북</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="btn-search-toggle" aria-label="검색">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
        <!-- Search Bar (hidden by default) -->
        <div class="search-bar" id="search-bar">
            <div class="search-bar-inner">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" placeholder="스토리 제목을 검색하세요..." autocomplete="off">
                <button class="btn-search-clear" id="btn-search-clear" aria-label="검색 초기화">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Step Filter -->
        <section class="step-filter-section">
            <div class="step-filter-scroll">
                <button class="step-btn active" data-step="all">
                    <span class="step-btn-icon">📖</span>
                    <span class="step-btn-label">전체</span>
                </button>
                <button class="step-btn" data-step="1">
                    <span class="step-btn-icon">🌱</span>
                    <span class="step-btn-label">Step 1</span>
                    <span class="step-btn-desc">Ready to Read</span>
                </button>
                <button class="step-btn" data-step="2">
                    <span class="step-btn-icon">🌿</span>
                    <span class="step-btn-label">Step 2</span>
                    <span class="step-btn-desc">Reading with Help</span>
                </button>
                <button class="step-btn" data-step="3">
                    <span class="step-btn-icon">🌳</span>
                    <span class="step-btn-label">Step 3</span>
                    <span class="step-btn-desc">Reading on Your Own</span>
                </button>
                <button class="step-btn" data-step="4">
                    <span class="step-btn-icon">🏔️</span>
                    <span class="step-btn-label">Step 4</span>
                    <span class="step-btn-desc">Reading Paragraphs</span>
                </button>
                <button class="step-btn" data-step="5">
                    <span class="step-btn-icon">🚀</span>
                    <span class="step-btn-label">Step 5</span>
                    <span class="step-btn-desc">Ready for Chapters</span>
                </button>
            </div>
        </section>

        <!-- Category Filter -->
        <section class="category-filter-section" id="category-filter-section">
            <div class="category-filter-scroll" id="category-filter-scroll">
                <!-- Dynamically generated -->
            </div>
        </section>

        <!-- Stats Bar -->
        <section class="stats-bar">
            <div class="stats-inner">
                <span class="stats-text" id="stats-text">전체 스토리 <strong>0</strong>편</span>
            </div>
        </section>

        <!-- Story Grid -->
        <section class="story-grid-section">
            <div class="story-grid" id="story-grid">
                <!-- Dynamically generated story cards -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="empty-state" style="display:none;">
                <div class="empty-icon">📭</div>
                <h3>스토리가 없습니다</h3>
                <p>선택한 조건에 맞는 스토리를 찾을 수 없어요.</p>
                <button class="btn-reset" id="btn-reset-filter">필터 초기화</button>
            </div>

            <!-- Error State -->
            <div class="error-state" id="error-state" style="display:none;">
                <div class="error-icon">⚠️</div>
                <h3>데이터를 불러올 수 없습니다</h3>
                <p>인터넷 연결을 확인하고 다시 시도해 주세요.</p>
                <button class="btn-retry" id="btn-retry">다시 시도</button>
            </div>
        </section>
    </main>

    <!-- Story Detail Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="story-modal">
            <div class="modal-header">
                <button class="modal-close" id="modal-close" aria-label="닫기">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamically filled -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-inner">
            <p>📚 K-Story Readers &copy; 2026 | 한국 문화를 영어로 배워요!</p>
            <p class="footer-sub">Powered by Google Sheets & Gemini GEMS</p>
        </div>
    </footer>

    <!-- Scripts -->
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/reader.js"></script>
<script src="js/app.js"></script>
</body>
</html>
